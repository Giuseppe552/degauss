name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: cd packages/core && npx tsc

      - name: Typecheck
        run: |
          cd packages/core && npx tsc --noEmit
          cd ../../apps/cli && npx tsc --noEmit

      - name: Test
        run: cd packages/core && npx vitest run

      - name: Build CLI
        run: cd apps/cli && npx tsc

      - name: CLI smoke test
        run: |
          node apps/cli/dist/index.js --version
          node apps/cli/dist/index.js score --profile examples/sample-profile.json --country US 2>/dev/null | head -1
